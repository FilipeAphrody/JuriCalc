components:
  schemas:
    AlimonyArrears:
      type: object
      properties:
        monthly_alimony:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        index_name:
          type: string
          default: INPC
          maxLength: 50
        interest_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          default: '0.0100'
        fine_percentage:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          default: '0.1000'
      required:
      - end_date
      - monthly_alimony
      - start_date
    BankingAmortization:
      type: object
      properties:
        principal:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
        rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          description: 'Taxa ao mês em decimal (ex: 0.01)'
        periods:
          type: integer
          minimum: 1
        system:
          allOf:
          - $ref: '#/components/schemas/SystemEnum'
          default: PRICE
      required:
      - periods
      - principal
      - rate
    CivilCalculation:
      type: object
      properties:
        principal:
          type: string
          format: decimal
          pattern: ^-?\d{0,13}(?:\.\d{0,2})?$
        start_date:
          type: string
          format: date
        end_date:
          type: string
          format: date
        index_name:
          type: string
          maxLength: 50
        interest_rate:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
        interest_type:
          allOf:
          - $ref: '#/components/schemas/InterestTypeEnum'
          default: simple
        fine_percentage:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          default: '0.0000'
        fees_percentage:
          type: string
          format: decimal
          pattern: ^-?\d{0,1}(?:\.\d{0,4})?$
          default: '0.0000'
        claim_type:
          allOf:
          - $ref: '#/components/schemas/ClaimTypeEnum'
          default: debt
      required:
      - end_date
      - index_name
      - interest_rate
      - principal
      - start_date
    ClaimTypeEnum:
      enum:
      - debt
      - execution
      - rent
      - condo
      type: string
      description: |-
        * `debt` - debt
        * `execution` - execution
        * `rent` - rent
        * `condo` - condo
    Client:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        type:
          $ref: '#/components/schemas/TypeEnum'
        name:
          type: string
          maxLength: 255
        document_number:
          type: string
          description: CPF ou CNPJ
          maxLength: 20
        contact_info:
          description: Email, Telefone, Endereço, etc.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
